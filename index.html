<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Meeting with Elias</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f8f9fa;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        .time-slot {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            background: white;
        }
        .time-slot.selected {
            border-color: #2ecc71;
            background-color: #e8f5e8;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Book a Meeting with Elias</h1>
        <p class="subtitle">Stanford GSB Student • Select your preferred time</p>
        
        <form id="bookingForm">
            <div class="form-group">
                <label for="duration">Meeting Duration</label>
                <select id="duration" required>
                    <option value="15">15 minutes</option>
                    <option value="30" selected>30 minutes</option>
                    <option value="45">45 minutes</option>
                    <option value="60">1 hour</option>
                </select>
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <select id="location" required>
                    <option value="virtual">Virtual (Google Meet)</option>
                    <option value="coupa">Coupa Café (GSB)</option>
                    <option value="arbuckle">Arbuckle Dining</option>
                </select>
            </div>

            <div class="form-group">
                <label>Available Times</label>
                <div id="timeSlots" class="time-grid">
                    <div class="time-slot" onclick="selectSlot(this)">Monday, March 3rd at 10:00 AM</div>
                    <div class="time-slot" onclick="selectSlot(this)">Monday, March 3rd at 2:30 PM</div>
                    <div class="time-slot" onclick="selectSlot(this)">Tuesday, March 4th at 9:15 AM</div>
<div class="time-slot" onclick="selectSlot(this)">Wednesday, March 5th at 11:00 AM</div>
                </div>
            </div>

            <div class="form-group">
                <label for="name">Your Name *</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label for="email">Your Email *</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="notes">Meeting Notes (optional)</label>
                <textarea id="notes" rows="3" placeholder="What would you like to discuss?"></textarea>
            </div>

            <button type="submit">Book Meeting</button>
        </form>
    </div>

    <script>
        let selectedSlot = null;

        function selectSlot(element) {
            document.querySelectorAll('.time-slot').forEach(slot => {
                slot.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedSlot = element.textContent;
        }

        document.getElementById('bookingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!selectedSlot) {
                alert('Please select a time slot');
                return;
            }
            
            const formData = {
                slot: selectedSlot,
                duration: document.getElementById('duration').value,
                location: document.getElementById('location').value,
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                notes: document.getElementById('notes').value
            };
            
            alert('Meeting booked! (Demo mode - will connect to real calendar next)');
            console.log('Booking:', formData);
        });
    </script>
</body>
</html>
